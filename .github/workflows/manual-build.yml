name: Manual Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifact bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/dropship-cmd-linux-x86_64
          cp target/release/dropship-cmd dist/dropship-cmd-linux-x86_64/dropship-cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropship-cmd-linux-x86_64
          path: dist/dropship-cmd-linux-x86_64/dropship-cmd
          if-no-files-found: error

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifact bundle
        shell: pwsh
        run: |
          $bundleDir = "dist/dropship-cmd-windows-x86_64"
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
          Copy-Item -Path "target/release/dropship-cmd.exe" -Destination "$bundleDir/dropship-cmd.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropship-cmd-windows-x86_64
          path: dist/dropship-cmd-windows-x86_64/dropship-cmd.exe
          if-no-files-found: error
