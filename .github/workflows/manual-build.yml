name: Manual Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: dropship-cmd-linux-x86_64
            binary_name: dropship-cmd
          - os: windows-latest
            artifact_name: dropship-cmd-windows-x86_64
            binary_name: dropship-cmd.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifact bundle
        shell: pwsh
        run: |
          $repoRoot = $env:GITHUB_WORKSPACE
          $bundleDir = Join-Path $repoRoot ("dist/" + "${{ matrix.artifact_name }}")
          New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null

          $binaryPath = Join-Path $repoRoot ("target/release/" + "${{ matrix.binary_name }}")
          Copy-Item -Path $binaryPath -Destination (Join-Path $bundleDir "${{ matrix.binary_name }}") -Force
          Copy-Item -Path (Join-Path $repoRoot "README.md") -Destination (Join-Path $bundleDir "README.md") -Force
          Copy-Item -Path (Join-Path $repoRoot "COMMANDS.md") -Destination (Join-Path $bundleDir "COMMANDS.md") -Force

          if ("${{ matrix.os }}" -eq "windows-latest") {
            Copy-Item -Path (Join-Path $repoRoot "icon.ico") -Destination (Join-Path $bundleDir "icon.ico") -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
